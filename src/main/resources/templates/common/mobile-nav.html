<!--
  공용 모바일 하단 네비게이션 — 5개 메인 탭 + 더보기 아코디언.
  사용법:
    <div th:replace="~{common/mobile-nav :: mobileNav('chat')}"></div>
  파라미터 active: 'home' | 'explore' | 'friends' | 'chat' | 'more' (현재 페이지 표시)
  CSS / JS는 페이지에서 직접 로드:
    <link rel="stylesheet" href="/css/common/mobile-nav.css">
    <script src="/js/common/mobile-nav.js" defer></script>
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="mobileNav(active)" class="mobile-nav">
    <a href="/main/main"
       th:classappend="${active == 'home' ? ' active' : ''}"
       th:attrappend="aria-current=${active == 'home' ? 'page' : null}"
       class="mob-nav-item">
        <svg viewBox="0 0 24 24">
            <path d="M21.591 7.146L12.52 1.157c-.316-.21-.724-.21-1.04 0L2.409 7.146A1.186 1.186 0 002 8.153V19.82a2.187 2.187 0 002.188 2.188h5.312a.75.75 0 00.75-.75v-6.086h3.5v6.086a.75.75 0 00.75.75h5.312A2.187 2.187 0 0022 19.82V8.153a1.186 1.186 0 00-.409-1.007z"></path>
        </svg>
    </a>
    <a href="/explore"
       th:classappend="${active == 'explore' ? ' active' : ''}"
       th:attrappend="aria-current=${active == 'explore' ? 'page' : null}"
       class="mob-nav-item">
        <svg viewBox="0 0 24 24">
            <path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"></path>
        </svg>
    </a>
    <a href="/friends"
       th:classappend="${active == 'friends' ? ' active' : ''}"
       th:attrappend="aria-current=${active == 'friends' ? 'page' : null}"
       class="mob-nav-item">
        <svg viewBox="0 0 24 24">
            <path d="M16.697 5.5c1.813 0 3.303 1.46 3.303 3.25 0 .967-.426 1.885-1.17 2.668L12 18.01l-6.83-6.592A3.74 3.74 0 014 8.75C4 6.96 5.49 5.5 7.303 5.5c.967 0 1.89.414 2.546 1.14L12 8.89l2.151-2.25A3.55 3.55 0 0116.697 5.5zm0-2C15.09 3.5 13.55 4.14 12 5.76 10.45 4.14 8.91 3.5 7.303 3.5 4.386 3.5 2 5.82 2 8.75c0 1.49.62 2.91 1.72 3.97l7.53 7.26a1 1 0 001.39 0l7.53-7.26A5.62 5.62 0 0022 8.75c0-2.93-2.386-5.25-5.303-5.25z"></path>
        </svg>
    </a>
    <a href="/chat"
       th:classappend="${active == 'chat' ? ' active' : ''}"
       th:attrappend="aria-current=${active == 'chat' ? 'page' : null}"
       class="mob-nav-item">
        <svg viewBox="0 0 24 24">
            <path d="M1.998 5.5c0-1.381 1.119-2.5 2.5-2.5h15c1.381 0 2.5 1.119 2.5 2.5v13c0 1.381-1.119 2.5-2.5 2.5h-15c-1.381 0-2.5-1.119-2.5-2.5v-13zm2.5-.5a.5.5 0 00-.5.5v2.764l8 3.638 8-3.636V5.5a.5.5 0 00-.5-.5h-15zm15.5 5.463l-8 3.636-8-3.638V18.5a.5.5 0 00.5.5h15a.5.5 0 00.5-.5v-8.037z"></path>
        </svg>
        <span class="mob-nav-badge Chat-MobMessageBadge off"></span>
    </a>
    <button type="button"
            th:classappend="${active == 'more' ? ' active' : ''}"
            class="mob-nav-item mob-nav-more"
            id="mobNavMore"
            aria-expanded="false"
            aria-controls="mobNavMoreSheet">
        <svg viewBox="0 0 24 24">
            <path d="M3.75 12c0-4.56 3.69-8.25 8.25-8.25s8.25 3.69 8.25 8.25-3.69 8.25-8.25 8.25S3.75 16.56 3.75 12zM12 1.75C6.34 1.75 1.75 6.34 1.75 12S6.34 22.25 12 22.25 22.25 17.66 22.25 12 17.66 1.75 12 1.75zm-4.75 11.5c.69 0 1.25-.56 1.25-1.25s-.56-1.25-1.25-1.25S6 11.31 6 12s.56 1.25 1.25 1.25zm9.5 0c.69 0 1.25-.56 1.25-1.25s-.56-1.25-1.25-1.25-1.25.56-1.25 1.25.56 1.25 1.25 1.25zM13.25 12c0 .69-.56 1.25-1.25 1.25s-1.25-.56-1.25-1.25.56-1.25 1.25-1.25 1.25.56 1.25 1.25z"></path>
        </svg>
    </button>
</nav>

<!-- 더보기 시트 — 같은 fragment 호출 시 함께 들어감. id 중복 방지를 위해 페이지당 1번만 호출. -->
<div th:fragment="mobileMoreSheet" >
    <div class="mob-more-backdrop off" id="mobMoreBackdrop"></div>
    <div class="mob-more-sheet off" id="mobNavMoreSheet" role="menu" aria-hidden="true">
        <a href="/notification" class="mob-more-item" role="menuitem">
            <svg viewBox="0 0 24 24"><path d="M19.993 9.042C19.48 5.017 16.054 2 11.996 2s-7.49 3.021-7.999 7.051L2.866 18H7.1c.463 2.282 2.481 4 4.9 4s4.437-1.718 4.9-4h4.236l-1.143-8.958zM12 20c-1.306 0-2.417-.835-2.829-2h5.658c-.412 1.165-1.523 2-2.829 2zm-6.866-4l.847-6.698C6.364 6.272 8.941 4 11.996 4s5.627 2.268 6.013 5.295L18.858 16H5.134z"></path></svg>
            <span>알림</span>
        </a>
        <a href="/community" class="mob-more-item" role="menuitem">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zM4 12c0-4.418 3.582-8 8-8 1.848 0 3.55.627 4.9 1.672L5.672 16.9A7.965 7.965 0 014 12zm8 8c-1.848 0-3.55-.627-4.9-1.672l11.228-11.228A7.965 7.965 0 0120 12c0 4.418-3.582 8-8 8z"></path></svg>
            <span>커뮤니티</span>
        </a>
        <a href="/bookmark" class="mob-more-item" role="menuitem">
            <svg viewBox="0 0 24 24"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z"></path></svg>
            <span>북마크</span>
        </a>
        <a href="/subscribe" class="mob-more-item" role="menuitem">
            <svg viewBox="0 0 24 24"><path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"></path></svg>
            <span>구독</span>
        </a>
        <a href="/mypage" class="mob-more-item" role="menuitem">
            <svg viewBox="0 0 24 24"><path d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"></path></svg>
            <span>프로필</span>
        </a>
        <button type="button" class="mob-more-item mob-more-logout" id="mobMoreLogout" role="menuitem">
            <svg viewBox="0 0 24 24"><path d="M14 4v2H5v12h9v2H3V4h11zm5.5 8l-3.5 3.5-1.4-1.4 1.1-1.1H9v-2h6.7l-1.1-1.1 1.4-1.4L19.5 12z"></path></svg>
            <span>로그아웃</span>
        </button>
    </div>
</div>

</body>
</html>
